<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Despacho Bonsai — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      background: linear-gradient(140deg,
        #fce8f6 0%,
        #ede4fb 22%,
        #deeafa 50%,
        #d8f5ec 78%,
        #fef3e2 100%);
      min-height: 100vh;
    }

    /* Subtle grain overlay for depth */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── Claymorphism shadows ── */
    .clay-sphere {
      border-radius: 50%;
      box-shadow:
        10px 10px 24px rgba(109, 40, 217, 0.28),
        -7px -7px 14px rgba(255, 255, 255, 0.92),
        inset  7px  7px 16px rgba(255, 255, 255, 0.52),
        inset -7px -7px 16px rgba(109, 40, 217, 0.22);
    }

    .clay-bubble {
      border-radius: 50%;
      box-shadow:
        5px 5px 14px rgba(0, 0, 0, 0.18),
        -4px -4px 8px rgba(255, 255, 255, 0.88),
        inset  4px  4px 10px rgba(255, 255, 255, 0.55),
        inset -4px -4px 10px rgba(0, 0, 0, 0.12);
    }

    .clay-card {
      border-radius: 20px;
      box-shadow:
        6px 6px 16px rgba(0, 0, 0, 0.13),
        -4px -4px 10px rgba(255, 255, 255, 0.92),
        inset  3px  3px  8px rgba(255, 255, 255, 0.62),
        inset -3px -3px  8px rgba(0, 0, 0, 0.07);
    }

    /* Pulse rings for the sphere */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Label pill under each bubble */
    .bubble-label {
      font-size: 10.5px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.72);
      padding: 2px 9px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
  </style>
</head>

<body>
  <section id="hero" style="position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;">

    <!-- ── Hero text ── -->
    <div id="hero-text" style="position:absolute; top:52px; left:50%; transform:translateX(-50%); text-align:center; z-index:5; white-space:nowrap;">
      <p style="font-size:12px; font-weight:700; letter-spacing:0.18em; color:#7c3aed; text-transform:uppercase; margin-bottom:10px; opacity:0.8;">Despacho Bonsai AI</p>
      <h1 style="font-size:clamp(1.8rem,3.2vw,3rem); font-weight:900; line-height:1.08; color:#3b0764; text-shadow:0 2px 6px rgba(255,255,255,0.6);">
        Every message. One inbox.<br />
        <span style="color:#6d28d9;">Zero dropped balls.</span>
      </h1>
      <p style="margin-top:12px; font-size:clamp(0.85rem,1.3vw,1.05rem); color:#5b21b6; opacity:0.82;">
        AI agents that close sales, resolve tickets &amp; book meetings — 24/7.
      </p>
    </div>

    <!-- ── Channel Bubbles ── -->
    <!-- Each bubble: absolute, left-side, will be animated off-screen by JS on init -->

    <div class="bubble" id="b-wa" style="position:absolute; left:168px; top:22%; display:flex; flex-direction:column; align-items:center; gap:7px;">
      <div class="clay-bubble" style="width:78px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(145deg,#6ee7a0,#22c55e);">💬</div>
      <span class="bubble-label" style="color:#15803d;">WhatsApp</span>
    </div>

    <div class="bubble" id="b-ig" style="position:absolute; left:148px; top:37%; display:flex; flex-direction:column; align-items:center; gap:7px;">
      <div class="clay-bubble" style="width:78px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(145deg,#f9a8d4,#a855f7);">📸</div>
      <span class="bubble-label" style="color:#86198f;">Instagram</span>
    </div>

    <div class="bubble" id="b-fb" style="position:absolute; left:185px; top:51%; display:flex; flex-direction:column; align-items:center; gap:7px;">
      <div class="clay-bubble" style="width:78px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(145deg,#93c5fd,#2563eb);">👤</div>
      <span class="bubble-label" style="color:#1e40af;">Facebook</span>
    </div>

    <div class="bubble" id="b-email" style="position:absolute; left:155px; top:65%; display:flex; flex-direction:column; align-items:center; gap:7px;">
      <div class="clay-bubble" style="width:78px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(145deg,#fde68a,#f59e0b);">✉️</div>
      <span class="bubble-label" style="color:#92400e;">Email</span>
    </div>

    <div class="bubble" id="b-tg" style="position:absolute; left:175px; top:79%; display:flex; flex-direction:column; align-items:center; gap:7px;">
      <div class="clay-bubble" style="width:78px;height:78px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(145deg,#67e8f9,#0284c7);">✈️</div>
      <span class="bubble-label" style="color:#075985;">Telegram</span>
    </div>

    <!-- ── Central Sphere ── -->
    <div id="sphere-wrap" style="position:relative;display:flex;align-items:center;justify-content:center;z-index:10;flex-shrink:0;">
      <div class="pulse-ring" id="pr1" style="width:250px;height:250px;border:3px solid rgba(167,139,250,0.38);"></div>
      <div class="pulse-ring" id="pr2" style="width:300px;height:300px;border:3px solid rgba(167,139,250,0.2);"></div>

      <div id="sphere" class="clay-sphere" style="
        width:192px; height:192px;
        background:linear-gradient(140deg, #c4b5fd 0%, #8b5cf6 55%, #6d28d9 100%);
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        flex-shrink:0; position:relative; z-index:2;
      ">
        <img
          src="bonsai-logo-white-assets/bonsai-logo-white.svg"
          alt="Bonsai"
          style="width:118px; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.28));"
        />
        <span style="color:rgba(255,255,255,0.7);font-size:10px;font-weight:600;letter-spacing:0.14em;margin-top:6px;text-transform:uppercase;">AI Agent</span>
      </div>
    </div>

    <!-- ── Outcome Cards ── -->
    <div id="cards" style="position:absolute;right:110px;display:flex;flex-direction:column;gap:14px;z-index:10;">

      <div id="c-sale" class="clay-card" style="
        display:flex;align-items:center;gap:13px;padding:15px 20px;width:228px;
        background:linear-gradient(140deg,#d1fae5,#6ee7b7);
        opacity:0;
      ">
        <span style="font-size:26px;flex-shrink:0;">✅</span>
        <div>
          <div style="font-size:10px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:0.09em;opacity:0.75;">Outcome</div>
          <div style="font-size:14px;font-weight:800;color:#064e3b;margin-top:1px;">Sale Closed</div>
        </div>
      </div>

      <div id="c-support" class="clay-card" style="
        display:flex;align-items:center;gap:13px;padding:15px 20px;width:228px;
        background:linear-gradient(140deg,#dbeafe,#93c5fd);
        opacity:0;
      ">
        <span style="font-size:26px;flex-shrink:0;">🎫</span>
        <div>
          <div style="font-size:10px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:0.09em;opacity:0.75;">Outcome</div>
          <div style="font-size:14px;font-weight:800;color:#1e3a8a;margin-top:1px;">Support Resolved</div>
        </div>
      </div>

      <div id="c-meeting" class="clay-card" style="
        display:flex;align-items:center;gap:13px;padding:15px 20px;width:228px;
        background:linear-gradient(140deg,#fef3c7,#fde68a);
        opacity:0;
      ">
        <span style="font-size:26px;flex-shrink:0;">📅</span>
        <div>
          <div style="font-size:10px;font-weight:700;color:#78350f;text-transform:uppercase;letter-spacing:0.09em;opacity:0.75;">Outcome</div>
          <div style="font-size:14px;font-weight:800;color:#78350f;margin-top:1px;">Meeting Booked</div>
        </div>
      </div>
    </div>

  </section>

  <script>
    /* ─────────────────────────────────────────────
       Config
    ───────────────────────────────────────────── */
    const BUBBLES = [
      { id: '#b-wa',    chaosX:  22, chaosY: -35 },
      { id: '#b-ig',    chaosX: -18, chaosY:  28 },
      { id: '#b-fb',    chaosX:  30, chaosY: -50 },
      { id: '#b-email', chaosX: -10, chaosY:  18 },
      { id: '#b-tg',    chaosX:  14, chaosY:  42 },
    ];
    const CARDS = ['#c-sale', '#c-support', '#c-meeting'];

    const CLAY_SHADOW_NORMAL =
      '10px 10px 24px rgba(109,40,217,0.28),' +
      '-7px -7px 14px rgba(255,255,255,0.92),' +
      'inset 7px 7px 16px rgba(255,255,255,0.52),' +
      'inset -7px -7px 16px rgba(109,40,217,0.22)';

    const CLAY_SHADOW_GLOW =
      '0 0 55px rgba(167,139,250,0.9),' +
      '0 0 110px rgba(167,139,250,0.45),' +
      '10px 10px 24px rgba(109,40,217,0.28),' +
      '-7px -7px 14px rgba(255,255,255,0.92),' +
      'inset 7px 7px 16px rgba(255,255,255,0.52),' +
      'inset -7px -7px 16px rgba(109,40,217,0.22)';

    /* ─────────────────────────────────────────────
       Always-on ambient animations
    ───────────────────────────────────────────── */
    // Pulse rings
    gsap.to('#pr1', { scale: 1.7, opacity: 0, duration: 2.3, repeat: -1, ease: 'power2.out' });
    gsap.to('#pr2', { scale: 2.0, opacity: 0, duration: 3.0, delay: 0.8, repeat: -1, ease: 'power2.out' });

    // Sphere gentle bob
    gsap.to('#sphere-wrap', {
      y: -11,
      duration: 3.2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
    });

    /* ─────────────────────────────────────────────
       Helpers
    ───────────────────────────────────────────── */
    function center(el) {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function glowSphere() {
      gsap.timeline()
        .to('#sphere', {
          boxShadow: CLAY_SHADOW_GLOW,
          scale: 1.11,
          duration: 0.16,
          ease: 'power2.out',
        })
        .to('#sphere', {
          boxShadow: CLAY_SHADOW_NORMAL,
          scale: 1,
          duration: 0.45,
          ease: 'elastic.out(1, 0.4)',
        });
    }

    /* ─────────────────────────────────────────────
       Main animation loop
    ───────────────────────────────────────────── */
    function runLoop() {
      const sphereEl = document.querySelector('#sphere');

      // ── Reset ──
      BUBBLES.forEach(b => gsap.set(b.id, { x: -600, opacity: 0, scale: 0.7 }));
      CARDS.forEach(c => gsap.set(c, { opacity: 0, x: 70, scale: 0.88 }));
      gsap.set('#sphere', { boxShadow: CLAY_SHADOW_NORMAL, scale: 1 });

      const tl = gsap.timeline({
        onComplete: () => gsap.delayedCall(0.6, runLoop),
      });

      /* ── Phase 1: Chaotic entry from left ── */
      BUBBLES.forEach((b, i) => {
        tl.to(b.id, {
          x: b.chaosX,
          y: b.chaosY,
          opacity: 1,
          scale: 1,
          duration: 0.7,
          ease: 'elastic.out(1, 0.55)',
        }, i * 0.14);
      });

      /* ── Phase 2: Suck into sphere one by one ── */
      tl.addLabel('suck', '+=0.45');

      BUBBLES.forEach((b, i) => {
        tl.add(() => {
          const el   = document.querySelector(b.id);
          const bc   = center(el);
          const sc   = center(sphereEl);
          const dx   = sc.x - bc.x;
          const dy   = sc.y - bc.y;
          const curX = gsap.getProperty(el, 'x');
          const curY = gsap.getProperty(el, 'y');

          gsap.to(b.id, {
            x: curX + dx,
            y: curY + dy,
            scale: 0,
            opacity: 0,
            duration: 0.52,
            ease: 'power3.in',
            onComplete: glowSphere,
          });
        }, `suck+=${i * 0.52}`);
      });

      /* ── Phase 3: Cards slide out from sphere right ── */
      const cardsAt = `suck+=${BUBBLES.length * 0.52 + 0.35}`;
      tl.addLabel('cards', cardsAt);

      CARDS.forEach((c, i) => {
        tl.to(c, {
          opacity: 1,
          x: 0,
          scale: 1,
          duration: 0.55,
          ease: 'back.out(1.6)',
        }, `cards+=${i * 0.24}`);
      });

      /* ── Hold then clear ── */
      const clearAt = `cards+=${CARDS.length * 0.24 + 2.2}`;
      tl.to(CARDS, {
        opacity: 0,
        x: 40,
        duration: 0.4,
        stagger: 0.1,
        ease: 'power2.in',
      }, clearAt);
    }

    // Kick off after layout settles
    gsap.delayedCall(0.25, runLoop);
  </script>
</body>
</html>
