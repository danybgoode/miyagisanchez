<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS6 Style Slider Button</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* The main container for the slider component */
        .slider-wrapper {
            position: relative;
            width: 300px;
            height: 52px;
            background: linear-gradient(180deg, #070808 0%, #292929 100%);
            border-radius: 13px;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* The track/frame of the slider */
        .slider-frame {
            position: absolute;
            width: 58px;
            height: 44px;
            left: 4px;
            top: 4px;
            background: linear-gradient(180deg, #ECECEC 0%, #A2A2A2 100%);
            box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.6);
            border-radius: 9px;
            z-index: 1;
        }

        /* The text label that says "Slide to unlock" */
        .slider-label {
            position: absolute;
            width: 100%;
            height: 25px;
            top: calc(50% - 12.5px);
            text-align: center;
            font-size: 21px;
            line-height: 25px;
            color: #000000;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through to the slider */
        }

        /* The moving handle (the shape that slides) */
        .slider-handle {
            position: absolute;
            width: 32px;
            height: 23px;
            left: 4px; /* Initial position */
            top: calc(50% - 11.5px);
            background: linear-gradient(180deg, #8C8C8C 0%, #676767 100%);
            box-shadow: 0px 0.5px 0.5px rgba(255, 255, 255, 0.8), 
                        inset 0px 0.5px 0.5px rgba(0, 0, 0, 0.8), 
                        inset 0px 0px 1px rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            z-index: 3;
            cursor: grab;
        }

        /* The gloss effect on the handle */
        .slider-handle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.25) 100%);
            border-radius: 4px 4px 0 0;
        }

        /* The trailing fill/gradient effect that follows the handle */
        .slider-fill {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 0%; /* Controlled by JS */
            background: linear-gradient(90deg, rgba(251, 251, 251, 0) 0%, #FBFBFB 50%, rgba(251, 251, 251, 0) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Glow/Highlight effect on the track */
        .slider-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(90deg, rgba(251, 251, 251, 0) 0%, #FBFBFB 50%, rgba(251, 251, 251, 0) 100%);
            opacity: 0.3;
            z-index: 4;
            pointer-events: none;
        }

        /* State when unlocked */
        .slider-wrapper.unlocked {
            background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
        }
        .slider-wrapper.unlocked .slider-label {
            color: white;
        }
    </style>
</head>
<body>

<div class="slider-wrapper" id="sliderWrapper">
    <div class="slider-fill" id="sliderFill"></div>
    <div class="slider-glow"></div>
    <div class="slider-label" id="sliderLabel">Slide to unlock</div>
    <div class="slider-frame"></div>
    <div class="slider-handle" id="sliderHandle"></div>
</div>

<script>
    const wrapper = document.getElementById('sliderWrapper');
    const handle = document.getElementById('sliderHandle');
    const fill = document.getElementById('sliderFill');
    const label = document.getElementById('sliderLabel');

    let isDragging = false;
    let startX = 0;
    let maxLeft = wrapper.clientWidth - handle.clientWidth - 8; // Subtracting padding/margins

    const startDrag = (e) => {
        isDragging = true;
        startX = (e.type === 'touchstart' ? e.touches[0].clientX : e.clientX) - handle.offsetLeft;
        handle.style.cursor = 'grabbing';
    };

    const onDrag = (e) => {
        if (!isDragging) return;

        const clientX = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX);
        let currentX = clientX - startX;

        // Constrain movement within the wrapper bounds
        if (currentX < 4) currentX = 4;
        if (currentX > maxLeft) currentX = maxLeft;

        handle.style.left = `${currentX}px`;
        
        // Update fill width based on handle position
        const progress = (currentX + 4) / (maxLeft + 4);
        fill.style.width = `${progress * 100}%`;

        // Change label text as it slides
        if (progress > 0.8) {
            label.textContent = "Release to unlock";
        } else {
            label.textContent = "Slide to unlock";
        }
    };

    const stopDrag = () => {
        if (!isDragging) return;
        isDragging = false;
        handle.style.cursor = 'grab';

        const currentLeft = parseFloat(handle.style.left) || 4;
        const progress = (currentLeft + 4) / (maxLeft + 4);

        if (progress > 0.9) {
            // Successfully unlocked
            handle.style.left = `${maxLeft}px`;
            fill.style.width = '100%';
            label.textContent = "Unlocked!";
            wrapper.classList.add('unlocked');
            // Trigger success action here
        } else {
            // Snap back to start
            handle.style.transition = 'left 0.3s ease-out';
            fill.style.transition = 'width 0.3s ease-out';
            handle.style.left = '4px';
            fill.style.width = '0%';
            label.textContent = "Slide to unlock";
            
            setTimeout(() => {
                handle.style.transition = '';
                fill.style.transition = '';
            }, 300);
        }
    };

    // Mouse Events
    handle.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', stopDrag);

    // Touch Events (Mobile)
    handle.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', onDrag, { passive: false });
    window.addEventListener('touchend', stopDrag);

</script>

</body>
</html>
