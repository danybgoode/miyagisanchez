<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Financiero | MiyagiSánchez</title>
  <meta name="description" content="Tu panel financiero personalizado — MiyagiSánchez.">
  <!-- Prevent search engine indexing for this private/authenticated page -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Shared design system (base reset only; dashboard has its own dark chrome) -->
  <link rel="stylesheet" href="shared.css">

  <style>
    body {
      background: #f0ede8;
      min-height: 100vh;
    }

    /* Override grain texture — not needed on dashboard */
    body::before {
      display: none;
    }

    .dash-header {
      background: var(--ink);
      color: var(--paper);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dash-brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dash-brand-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 800;
      color: var(--paper);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dash-brand-sub {
      font-size: 0.75rem;
      color: rgba(245, 242, 236, 0.4);
      padding-left: 34px;
    }

    .inbox-pill {
      background: rgba(245, 242, 236, 0.06);
      border: 1px solid rgba(245, 242, 236, 0.12);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .inbox-label {
      font-size: 0.68rem;
      color: rgba(245, 242, 236, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .inbox-address {
      font-size: 0.85rem;
      font-family: monospace;
      color: var(--paper);
    }

    .copy-btn {
      background: rgba(245, 242, 236, 0.1);
      border: 1px solid rgba(245, 242, 236, 0.15);
      color: var(--paper);
      padding: 6px 14px;
      border-radius: 4px;
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: rgba(245, 242, 236, 0.18);
    }

    .copy-btn.copied {
      background: var(--sage);
      border-color: var(--sage);
    }

    .status-bar {
      background: white;
      border-bottom: 1px solid var(--rule);
      padding: 12px 32px;
      display: flex;
      gap: 32px;
      font-size: 0.8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .status-item strong {
      color: var(--ink);
      font-weight: 600;
    }

    .dash-container {
      padding: 24px 32px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
    }

    .dash-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      gap: 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--rule);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="dash-header">
    <div class="dash-brand">
      <div class="dash-brand-name">
        <div class="brand-mark">M</div>
        <span id="tenant-name">Cargando...</span>
      </div>
      <div class="dash-brand-sub">Panel financiero · MiyagiSánchez</div>
    </div>
    <div class="inbox-pill" id="inbox-pill" style="display:none">
      <div>
        <div class="inbox-label">Tu buzón de documentos</div>
        <div class="inbox-address" id="inbox-address"></div>
      </div>
      <button class="copy-btn" id="copy-btn" type="button" onclick="copyInbox()">Copiar</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar" style="display:none">
    <span class="status-item">Último documento: <strong id="last-doc">—</strong></span>
    <span class="status-item">Transacciones este mes: <strong id="tx-count">—</strong></span>
    <span class="status-item">Estado: <strong id="status-label">—</strong></span>
  </div>

  <div class="dash-container">
    <div class="dash-state" id="loading">
      <div class="spinner"></div>
      <p>Preparando tu dashboard...</p>
    </div>
    <div class="dash-state" id="error-msg" style="display:none">
      <p>Enlace inválido o expirado. Contacta a <a href="mailto:hola@despachobonsai.com">hola@despachobonsai.com</a>.
      </p>
    </div>
    <div id="frame-container" style="display:none"></div>
  </div>

  <script>
    const N8N_WEBHOOK = 'https://n8n.despachobonsai.com/webhook/dashboard-lookup';
    let pollCount = 0;

    async function loadDashboard() {
      const key = new URLSearchParams(window.location.search).get('key');
      if (!key) { showError(); return; }

      try {
        const res = await fetch(`${N8N_WEBHOOK}?key=${encodeURIComponent(key)}`);
        const data = await res.json();

        if (!data.valid) {
          if (pollCount < 10) {
            pollCount++;
            setTimeout(() => loadDashboard(), 2000);
            return;
          }
          showError();
          return;
        }

        // Populate header
        document.getElementById('tenant-name').textContent = data.tenantName || 'Tu empresa';

        // Show inbox address if provided
        if (data.inboxAddress) {
          document.getElementById('inbox-address').textContent = data.inboxAddress;
          document.getElementById('inbox-pill').style.display = 'flex';
        }

        // Show status bar if data is available
        if (data.lastDocument || data.txCount) {
          document.getElementById('last-doc').textContent = data.lastDocument || '—';
          document.getElementById('tx-count').textContent = data.txCount || '0';
          document.getElementById('status-label').textContent = data.statusLabel || 'Activo';
          document.getElementById('status-bar').style.display = 'flex';
        }

        // Render iframe safely — avoid innerHTML with untrusted URL
        document.getElementById('loading').style.display = 'none';
        document.getElementById('frame-container').style.display = 'block';

        const iframe = document.createElement('iframe');
        iframe.src = data.embedUrl;
        iframe.allowFullscreen = true;
        iframe.title = 'Dashboard financiero';
        document.getElementById('frame-container').appendChild(iframe);

      } catch (e) {
        showError();
      }
    }

    function copyInbox() {
      const addr = document.getElementById('inbox-address').textContent;
      navigator.clipboard.writeText(addr).catch(() => { });
      const btn = document.getElementById('copy-btn');
      btn.textContent = '¡Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar';
        btn.classList.remove('copied');
      }, 2000);
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'flex';
    }

    loadDashboard();
  </script>

</body>

</html>
